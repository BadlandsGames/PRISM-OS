<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>GUI</title>
    </head>
    <body onload="loadDashboard()">
        <script type="text/javascript">
            function talkFlask(param, param2) {
                fetch('/function_called', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ functionName: 'talkFlask', param: param, param2: param2})
                }).then(response => response.text()).then(data => console.log(data));
            }
            function shutdown_prism() {
                talkFlask("shutdown_prism", "");
            }
            function run_proton(path) {
                talkFlask("run_proton", path);
            }
            function run_wine(path) {
                talkFlask("run_wine", path);
            }
            function run_winemono(path) {
                talkFlask("run_winemono", path);
            }
            function run_elf(path) {
                talkFlask("run_elf", path);
            }
            function run_appimage(path) {
                talkFlask("run_appimage", path);
            }
            function loadDashboard() {
            }
        </script>
    </body>
</html>
