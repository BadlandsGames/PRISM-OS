<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>GUI</title>
    </head>
    <body onload="loadDashboard()">
        <script>
            function talkFlask(param) {
                fetch('/function_called', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ functionName: 'talkFlask', param: param})
                }).then(response => response.text()).then(data => console.log(data));
            }
            function loadDashboard() {
                talkFlask("run_proton");
            }
        </script>
    </body>
</html>
